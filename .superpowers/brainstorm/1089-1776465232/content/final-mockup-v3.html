<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup Final v3</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #0d2b5e 0%, #1a4b96 50%, #0d2b5e 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow-x: hidden;
}
body::before { content:''; position:fixed; top:-80px; right:-80px; width:320px; height:320px; border-radius:50%; background:rgba(169,202,72,.07); pointer-events:none; }
body::after  { content:''; position:fixed; bottom:-100px; left:-80px; width:400px; height:400px; border-radius:50%; background:rgba(169,202,72,.05); pointer-events:none; }
.page-tagline { color:rgba(255,255,255,.7); font-size:13px; margin-bottom:16px; letter-spacing:.3px; }
.register-card { width:100%; max-width:780px; background:#fff; border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.35); overflow:hidden; }
.card-topbar { display:flex; align-items:center; gap:16px; padding:12px 24px; border-bottom:3px solid #A9CA48; background:#fff; }
.topbar-logo { height:44px; width:auto; display:block; flex-shrink:0; }
.topbar-divider { width:1px; height:32px; background:#e9ecef; flex-shrink:0; }
.topbar-title { flex:1; }
.topbar-title h1 { font-size:15px; font-weight:700; color:#1a4b96; line-height:1.2; }
.topbar-title p  { font-size:11px; color:#6c757d; }
.step-indicator { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.step-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
.step-dot.active   { background:#A9CA48; color:#fff; }
.step-dot.inactive { background:#fff; border:2px solid #dee2e6; color:#adb5bd; }
.step-label { font-size:11px; font-weight:500; }
.step-label.active   { color:#A9CA48; }
.step-label.inactive { color:#adb5bd; }
.step-line { width:28px; height:2px; background:#dee2e6; }
.card-body { padding:24px; }
.section-title { font-size:13px; font-weight:600; color:#212529; border-left:3px solid #A9CA48; padding-left:10px; margin-bottom:18px; }
.form-row      { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
.form-row.full { grid-template-columns:1fr; }
.form-group label { display:block; font-size:12px; font-weight:500; color:#495057; margin-bottom:5px; }
.form-control { width:100%; border:1.5px solid #dee2e6; border-radius:7px; padding:9px 12px; font-size:13px; font-family:'Poppins',sans-serif; color:#495057; background:#fff; }
.form-control.focus  { border-color:#A9CA48; box-shadow:0 0 0 3px rgba(169,202,72,.15); outline:none; }
.form-control.filled { color:#212529; }
.card-footer-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-top:1px solid #f0f0f0; background:#fafafa; }
.link-secondary { font-size:12px; color:#1a4b96; text-decoration:none; }
.btn-primary-tg { background:#1a4b96; color:#fff; border:none; border-radius:8px; padding:10px 24px; font-size:13px; font-weight:600; font-family:'Poppins',sans-serif; cursor:pointer; display:flex; align-items:center; gap:6px; }
.btn-primary-tg .arrow { color:#A9CA48; font-size:15px; }
</style>
</head>
